name: Redeploy App

on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  redeploy:
    name: Pull & Restart on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_APP_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app

            echo "==> Pulling latest code..."
            git fetch origin production
            git reset --hard origin/production

            echo "==> Installing backend dependencies..."
            cd backend && npm install --production && cd ..

            echo "==> Building frontend..."
            cd frontend
            rm -rf node_modules package-lock.json
            npm install
            VITE_API_URL=/api npm run build
            sudo cp -r dist/* /usr/share/nginx/html/
            cd ..

            echo "==> Restarting backend..."
            pm2 restart event-ticketing-api

            echo "==> Done! App is live."
            pm2 status

  # ── Real end-to-end API test against the LIVE deployed app (Newman) ──────────
  smoke-test:
    name: API smoke test (Newman)
    runs-on: ubuntu-latest
    needs: redeploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman (Postman CLI)
        run: npm install -g newman newman-reporter-htmlextra

      - name: Wait for the live API to be reachable
        run: |
          BASE="http://${{ secrets.EC2_APP_HOST }}"
          echo "Probing $BASE/api/events ..."
          for i in $(seq 1 24); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$BASE/api/events" || echo 000)
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "API did not become reachable at $BASE within ~2 min"; exit 1

      - name: Run Postman collection against the live app (Newman)
        run: |
          newman run postman/TicketHub.postman_collection.json \
            --env-var "baseUrl=http://${{ secrets.EC2_APP_HOST }}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html
          retention-days: 14
