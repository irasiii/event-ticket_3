name: "AWS Infrastructure CI/CD"

on:
  pull_request:
    branches:
      - production
  # Manual trigger — choose apply or destroy
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

env:
  TF_VERSION:  "1.7.5"
  AWS_REGION:  "us-east-1"
  WORKING_DIR: "./terraform"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Terraform Plan  (runs on every PR and every push to production)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    permissions:
      contents: read
      pull-requests: write   # post plan output as PR comment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -var="key_pair_name=${{ secrets.AWS_KEY_PAIR_NAME }}" \
            -var="project_name=event-ticketing" \
            -var="environment=production" \
            -var="mongo_username=appuser" \
            -var="mongo_password=${{ secrets.MONGO_PASSWORD }}" \
            -var="mongo_database=event_ticketing" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="github_repo=https://github.com/irasiii/event-ticket_3.git" \
            -out=tfplan
        continue-on-error: true

      - name: Save human-readable plan
        run: terraform show -no-color tfplan > plan_output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.WORKING_DIR }}/tfplan
            ${{ env.WORKING_DIR }}/plan_output.txt
          retention-days: 5

      # Post plan as a PR comment
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const body = [
              '## Terraform Plan 📋',
              `**Branch:** \`${ context.payload.pull_request.head.ref }\``,
              `**Triggered by:** @${ context.actor }`,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              plan.length > maxLen ? plan.substring(0, maxLen) + '\n\n... (truncated)' : plan,
              '```',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Terraform Apply  (only on push to production, never on PRs)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download saved plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Print Outputs
        run: terraform output -no-color

      - name: Write outputs to job summary
        run: |
          echo "## 🚀 Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Terraform Destroy  (manual workflow_dispatch with action=destroy)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -auto-approve \
            -var="key_pair_name=${{ secrets.AWS_KEY_PAIR_NAME }}" \
            -var="project_name=event-ticketing" \
            -var="environment=production" \
            -var="mongo_username=appuser" \
            -var="mongo_password=${{ secrets.MONGO_PASSWORD }}" \
            -var="mongo_database=event_ticketing" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"

      - name: Destroy summary
        run: echo "## 🗑️ Infrastructure destroyed" >> $GITHUB_STEP_SUMMARY
