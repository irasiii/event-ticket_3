name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: Install, lint, test ───────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install

      - name: Run backend tests
        env:
          MONGO_URI: mongodb://localhost:27017/event_ticketing_test
          JWT_SECRET: ci_test_secret
          JWT_EXPIRE: 24h
          NODE_ENV: test
          PORT: 5000
        run: npm test --if-present

  # ─── Frontend: Install, lint, build ─────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Deploy (only on push to main) ──────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy notification
        run: |
          echo "✅ All checks passed."
          echo "🚀 Deploy step: connect your hosting provider here."
          echo "   Frontend: deploy ./frontend/dist to Vercel / Netlify"
          echo "   Backend:  deploy ./backend to Render / Railway"
          echo "   Database: use MongoDB Atlas connection string in prod .env"
